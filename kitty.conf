# Translated from .Xresources (Tomorrow Night colorscheme)

# Colors
foreground              #c5c8c6
background              #000000
background_opacity      0.8
cursor                  #c5c8c6

# black
color0                  #282a2e
color8                  #373b41

# red
color1                  #a54242
color9                  #cc6666

# green
color2                  #649440
color10                 #8abd68

# yellow
color3                  #de935f
color11                 #f0c674

# blue
color4                  #5f819d
color12                 #81a2be

# magenta
color5                  #85678f
color13                 #b294bb

# cyan
color6                  #5e8d87
color14                 #8abeb7

# white
color7                  #707880
color15                 #c5c8c6

# Font
font_family             Bitstream Vera Sans Mono
bold_font               Bitstream Vera Sans Mono Bold
italic_font             Bitstream Vera Sans Mono Italic
bold_italic_font        Bitstream Vera Sans Mono Bold Italic
font_size               14.0

# Cursor
cursor_blink_interval   0.5
cursor_shape            block

# Scrollback
scrollback_lines        10240

# Window
initial_window_width    92c
initial_window_height   24c
window_padding_width    2

# Tabs (approximating tabbedex bindings)
map ctrl+t              new_tab
map ctrl+shift+left     move_tab_left
map ctrl+shift+right    move_tab_right
map alt+1               goto_tab 1
map alt+2               goto_tab 2
map alt+3               goto_tab 3
map alt+4               goto_tab 4
map alt+5               goto_tab 5
map alt+6               goto_tab 6
map alt+7               goto_tab 7
map alt+8               goto_tab 8
map alt+9               goto_tab 9

# Clipboard (ctrl+shift+c/v are kitty defaults, listed here for clarity)
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
